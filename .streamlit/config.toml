# 朱哥短线雷达 · 本地复盘看板 — 项目级主题
# 强制启用奶油色浅主题，避免用户系统暗色偏好下出现白色块刺眼的问题。

[browser]
gatherUsageStats = false

[server]
headless = true
runOnSave = false
port = 8501

[theme]
base = "light"
primaryColor = "#9A6700"              # 主色调（黄褐 — 与品牌一致）
backgroundColor = "#F5EFE3"           # 页面主底 — 奶油
secondaryBackgroundColor = "#EFE3CF"  # 次级底（sidebar）
textColor = "#2B2118"                 # 主文字 — 深咖
font = "sans serif"
